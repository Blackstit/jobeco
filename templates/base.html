<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Job-Eco Admin{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/24/outline/index.css" />
  <style>
    /* Tailwind CDN doesn't process @apply; keep plain CSS minimal */
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50 flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 min-h-screen p-4">
    <div class="mb-8">
      <h1 class="text-xl font-semibold">Job-Eco Admin</h1>
      <p class="text-xs text-slate-400 mt-1">Панель управления</p>
    </div>
    
    <nav class="space-y-2">
      <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="/vacancies" class="flex items-center gap-3 px-4 py-3 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/vacancies' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <span>Вакансии</span>
      </a>
      <a href="/channels" class="flex items-center gap-3 px-4 py-3 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/channels' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <span>Каналы</span>
      </a>
      <div class="h-px bg-slate-800 my-2"></div>
      <a href="/analytics" class="flex items-center gap-3 px-4 py-3 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/analytics' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        <span>Аналитика</span>
      </a>

      <details class="group">
        <summary class="cursor-pointer flex items-center gap-3 px-4 py-3 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/settings' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37.805-1.368.17-2.524-1.065-2.572-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37 1.368.805 2.524.17 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span>Настройки</span>
          <svg class="w-4 h-4 ml-auto opacity-70 group-open:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </summary>

        <div class="mt-2 space-y-1 pl-2">
          <a href="/settings?tab=parser" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/settings' and request.query_params.get('tab') == 'parser' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
            Парсер
          </a>
          <a href="/settings?tab=openrouter" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/settings' and request.query_params.get('tab') == 'openrouter' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
            OpenRouter
          </a>
          <a href="/settings?tab=prompts" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/settings' and request.query_params.get('tab') == 'prompts' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
            Промпты
          </a>
          <a href="/settings?tab=sessions" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/settings' and request.query_params.get('tab') == 'sessions' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
            TG сессии
          </a>
          <a href="/settings?tab=users" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition {% if request.url.path == '/settings' and request.query_params.get('tab') == 'users' %}bg-slate-800 text-white{% else %}text-slate-300{% endif %}">
            Пользователи
          </a>
        </div>
      </details>
    </nav>
    
    <div class="mt-8 pt-8 border-t border-slate-800">
      <a href="/logout" class="flex items-center gap-3 px-4 py-3 rounded-lg border border-slate-800 hover:bg-slate-800/60 transition text-slate-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Выход</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
