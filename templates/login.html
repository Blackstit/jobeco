<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <title>Job-Eco Admin - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { @apply bg-slate-950 text-slate-50; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50 flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 shadow-xl">
      <h1 class="text-2xl font-semibold mb-6 text-center">Job-Eco Admin</h1>
      {% if error %}
      <div class="mb-4 p-3 bg-red-900/30 border border-red-800 rounded text-sm text-red-300">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-4">
          <label class="block text-sm text-slate-400 mb-2">Email</label>
          <input
            type="email"
            name="email"
            required
            autofocus
            autocomplete="username"
            class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500"
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm text-slate-400 mb-2">Пароль</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500"
          />
        </div>
        <button
          type="submit"
          class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition"
        >
          Войти
        </button>
      </form>
    </div>
  </div>
</body>
</html>
