<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <title>Job-Eco Admin - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #050507; font-family: 'Outfit', system-ui, sans-serif; }
    .input-dark {
      background: #0b0b10;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e2e8f0;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input-dark:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .input-dark::placeholder { color: #475569; }
  </style>
</head>
<body class="min-h-screen text-slate-300 flex items-center justify-center">
  <div class="w-full max-w-sm px-6">
    <div class="bg-[#0b0b10] border border-white/[0.06] rounded-2xl p-8 shadow-2xl">
      <div class="flex items-center justify-center gap-2.5 mb-8">
        <div class="w-10 h-10 rounded-xl bg-[rgba(16,185,129,0.12)] flex items-center justify-center">
          <svg class="w-5 h-5 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838l-3.14 1.346 2.352 1.005a1 1 0 00.788 0l7-3a1 1 0 000-1.838l-7-3.001zM3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0zM6 18a1 1 0 001-1v-2.065a8.935 8.935 0 00-2-.712V17a1 1 0 001 1z"/></svg>
        </div>
        <div class="text-lg font-semibold text-white tracking-tight">Job-Eco Admin</div>
      </div>

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-sm text-red-300">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs text-slate-500 uppercase tracking-wider mb-1.5">Email</label>
          <input
            type="email"
            name="email"
            required
            autofocus
            autocomplete="username"
            class="w-full px-4 py-2.5 input-dark text-sm"
          />
        </div>
        <div>
          <label class="block text-xs text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full px-4 py-2.5 input-dark text-sm"
          />
        </div>
        <button
          type="submit"
          class="w-full px-4 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-[#050507] font-medium rounded-lg transition shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/20"
        >
          Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
